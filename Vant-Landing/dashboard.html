<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANT | Dashboard View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; letter-spacing: -0.01em; }
        .bg-primary { background-color: #2563eb; }
        .text-primary { color: #2563eb; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-[#fcfdfe] text-slate-900 antialiased overflow-x-hidden">

    <!-- Navegación Replicada -->
    <nav class="glass-nav sticky top-0 z-[100] border-b border-slate-100 px-8 py-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 font-extrabold text-2xl tracking-tighter italic text-slate-900">
                <div class="bg-primary text-white p-1.5 rounded-lg shadow-lg shadow-blue-100">
                    <i data-lucide="command" class="w-6 h-6"></i>
                </div>
                <span>VANT</span>
            </a>
            <div class="hidden lg:flex gap-10 font-bold text-[10px] uppercase tracking-[0.25em] text-slate-400">
                <a href="index.html" class="hover:text-primary transition text-slate-500">VANT</a>
                <a href="index.html#consola" class="hover:text-primary transition text-slate-500">Funcionalidades</a>
                <a href="dashboard.html" class="text-primary transition">Dashboard</a>
            </div>
            <button class="bg-slate-900 text-white px-7 py-2.5 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-primary transition-all shadow-sm">
                Acceder
            </button>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="w-full bg-slate-100 py-16">
        <div class="max-w-7xl mx-auto px-8 mb-16 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter italic text-slate-900 mb-6">
                Dashboard <span class="text-primary italic">Pro</span>
            </h1>
            <p class="text-slate-500 text-lg md:text-xl font-medium leading-relaxed max-w-3xl mx-auto">
                Visualiza tu salud financiera con gráficos de torta por tipo, barras por subcategoría y widgets que puedes organizar a tu medida.
            </p>
        </div>
        
        <img src="images/dashboard-page.png" alt="Dashboard Full View" class="w-3/5 mx-auto block shadow-2xl rounded-3xl border border-white/50">
    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-8 py-16 border-t border-slate-50 flex justify-between items-center">
        <div class="flex items-center gap-2 font-bold text-lg tracking-tighter opacity-30">
            <div class="bg-slate-900 text-white p-1 rounded-md"><i data-lucide="command" class="w-4 h-4"></i></div>
            <span>VANT</span>
        </div>
        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">© 2026 // Copyright</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
