<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForecastPro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .feature-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; cursor: pointer; }
        .feature-card:hover { border-color: #4f46e5; transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* Tamaños originales restaurados */
        .text-hero-title { font-size: 2.5rem; line-height: 1.1; letter-spacing: -0.04em; font-weight: 800; }
        .text-hero-desc { font-size: 1.125rem; line-height: 1.5; color: #64748b; font-weight: 500; }

        .hero-carousel-viewport { overflow: hidden; width: 100%; border-radius: 2.5rem; border: 1px solid #f1f5f9; background: white; }
        .hero-carousel-container { display: flex; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); width: 100%; }
        .hero-slide { min-width: 100%; width: 100%; display: flex; align-items: stretch; }
        .hero-dot.active { width: 1.5rem; background-color: #4f46e5; opacity: 1; }

        .db-dark { background-color: #0f172a; border-radius: 2rem; }
        .db-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 1rem; }
    </style>
</head>
<body class="bg-[#fafafa] text-slate-900">

    <nav class="glass-nav sticky top-0 z-[100] border-b border-slate-200 px-6 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl tracking-tighter italic">
                    <div class="bg-indigo-600 text-white p-1 rounded-lg"><i data-lucide="bar-chart-4"></i></div>
                    <span>FORECAST<span class="text-indigo-600">PRO</span></span>
                </a>
                <div class="hidden md:block h-6 w-[1px] bg-slate-200 mx-2"></div>
                <span id="nav-tagline" class="hidden md:block text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400 italic leading-tight"></span>
            </div>
            <div class="flex gap-8 font-bold text-xs uppercase tracking-[0.2em] text-slate-500">
                <a href="#modulos" id="nav-modules" class="hover:text-indigo-600 transition"></a>
                <a href="dashboard.html" id="nav-dashboard" class="hover:text-indigo-600 transition"></a>
            </div>
        </div>
    </nav>

    <header class="max-w-5xl mx-auto px-6 pt-10 pb-6 text-center">
        <h1 id="hero-title" class="text-hero-title mb-3 tracking-tighter"></h1>
        <p id="hero-desc" class="text-hero-desc max-w-2xl mx-auto"></p>
    </header>

    <section class="max-w-5xl mx-auto px-6 mb-16">
        <div class="hero-carousel-viewport">
            <div id="carousel" class="hero-carousel-container"></div>
            <div id="carousel-dots" class="flex px-12 pb-8 gap-2"></div>
        </div>
    </section>

    <section id="modulos" class="max-w-7xl mx-auto px-6 py-10 border-t border-slate-200">
        <div id="modules-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </section>

    <script>
        const translations = {
            es: {
                tagline: "Ingeniería financiera para <br> decisiones sin fricción.",
                modules: "Módulos",
                dashboard: "Dashboard",
                heroTitle: 'Control de gastos <span class="text-indigo-600 italic">sin límites.</span>',
                heroDesc: "Módulos integrados para transformar cada centavo en datos accionables mediante voz e IA.",
                carousel: [
                    { label: "INPUT FORENSE", title: 'Voz <span class="text-indigo-600">NLP</span>', desc: "Interpretación de lenguaje natural para categorizar gastos.", type: "voice", val: '"1200 en panadería con débito..."' },
                    { 
                        label: "ANÁLISIS PREDICTIVO", title: 'Radar <span class="text-rose-600">Inflación</span>', desc: "Cálculo de inflación real basada en tu historial de precios.", type: "inflation",
                        chartTitle: "Inflación Acumulada por Categoría",
                        kpis: ["Inflación Prom.", "Más Afectada", "Gasto Mar 26"],
                        cats: ["Alimentación", "Vivienda", "Transporte", "Servicios"]
                    },
                    { 
                        label: "VISIÓN 360", title: 'Dashboard <span class="text-blue-600">Integral</span>', desc: "Distribución por tipo y seguimiento histórico de gastos.", type: "dashboard",
                        chartTitles: ["Distribución por Tipo", "Top Subcategorías", "Gasto Mensual"],
                        types: ["Fijos", "Variables"],
                        months: ["Oct", "Nov", "Dic", "Ene", "Feb", "Mar"]
                    }
                ],
                moduleItems: [
                    { title: "Voz NLP", icon: "mic", color: "bg-indigo-100 text-indigo-600", short: "Entrada natural." },
                    { title: "Granularidad N4", icon: "layers", color: "bg-emerald-100 text-emerald-600", short: "Trazabilidad." },
                    { title: "Radar Inflación", icon: "trending-up", color: "bg-rose-100 text-rose-600", short: "Predicción." },
                    { title: "Asesor Virtual", icon: "cpu", color: "bg-slate-900 text-white", short: "IA Determinista." },
                    { title: "Cuotas", icon: "calendar-days", color: "bg-blue-100 text-blue-600", short: "Cashflow." },
                    { title: "Presupuestos", icon: "bell-ring", color: "bg-amber-100 text-amber-600", short: "Alertas." },
                    { title: "Ingresos", icon: "wallet", color: "bg-emerald-50 text-emerald-600", short: "Balance." },
                    { title: "Eco PWA", icon: "smartphone", color: "bg-slate-200 text-slate-700", short: "App Nativa." }
                ]
            },
            en: {
                tagline: "Financial engineering for <br> frictionless decisions.",
                modules: "Modules",
                dashboard: "Dashboard",
                heroTitle: 'Expense control <span class="text-indigo-600 italic">without limits.</span>',
                heroDesc: "Integrated modules to transform every cent into actionable data via voice and AI.",
                carousel: [
                    { label: "FORENSIC INPUT", title: 'Voice <span class="text-indigo-600">NLP</span>', desc: "Natural language interpretation to categorize expenses.", type: "voice", val: '"1200 at bakery with debit..."' },
                    { 
                        label: "PREDICTIVE ANALYSIS", title: 'Inflation <span class="text-rose-600">Radar</span>', desc: "Real inflation calculation based on your price history.", type: "inflation",
                        chartTitle: "Accumulated Inflation by Category",
                        kpis: ["Avg. Inflation", "Most Affected", "Spent Mar 26"],
                        cats: ["Food", "Housing", "Transport", "Services"]
                    },
                    { 
                        label: "360 VISION", title: 'Full <span class="text-blue-600">Dashboard</span>', desc: "Type distribution and historical expense tracking.", type: "dashboard",
                        chartTitles: ["Type Distribution", "Top Subcategories", "Monthly Spending"],
                        types: ["Fixed", "Variable"],
                        months: ["Oct", "Nov", "Dec", "Jan", "Feb", "Mar"]
                    }
                ],
                moduleItems: [
                    { title: "Voice NLP", icon: "mic", color: "bg-indigo-100 text-indigo-600", short: "Natural input." },
                    { title: "N4 Granularity", icon: "layers", color: "bg-emerald-100 text-emerald-600", short: "Traceability." },
                    { title: "Inflation Radar", icon: "trending-up", color: "bg-rose-100 text-rose-600", short: "Prediction." },
                    { title: "Virtual Advisor", icon: "cpu", color: "bg-slate-900 text-white", short: "Deterministic AI." },
                    { title: "Installments", icon: "calendar-days", color: "bg-blue-100 text-blue-600", short: "Cashflow." },
                    { title: "Budgets", icon: "bell-ring", color: "bg-amber-100 text-amber-600", short: "Alertas." },
                    { title: "Income", icon: "wallet", color: "bg-emerald-50 text-emerald-600", short: "Balance." },
                    { title: "Eco PWA", icon: "smartphone", color: "bg-slate-200 text-slate-700", short: "Native App." }
                ]
            }
        };

        const lang = navigator.language.startsWith('es') ? 'es' : 'en';
        const t = translations[lang];

        function render() {
            document.getElementById('nav-tagline').innerHTML = t.tagline;
            document.getElementById('nav-modules').innerText = t.modules;
            document.getElementById('nav-dashboard').innerText = t.dashboard;
            document.getElementById('hero-title').innerHTML = t.heroTitle;
            document.getElementById('hero-desc').innerText = t.heroDesc;

            document.getElementById('carousel').innerHTML = t.carousel.map((s, i) => `
                <div class="hero-slide flex-col md:flex-row items-center">
                    <div class="w-full md:w-2/5 p-12 space-y-3">
                        <div class="inline-block px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-black italic tracking-widest">${s.label}</div>
                        <h2 class="text-4xl font-extrabold tracking-tighter italic leading-tight">${s.title}</h2>
                        <p class="text-slate-500 text-sm font-medium leading-relaxed">${s.desc}</p>
                    </div>
                    <div class="w-full md:w-3/5 p-6">
                        <div class="db-dark h-[400px] p-6 text-white overflow-hidden flex flex-col gap-4">
                            ${s.type === 'voice' ? `
                                <div class="flex-1 flex flex-col items-center justify-center">
                                    <div class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center animate-pulse mb-6"><i data-lucide="mic" class="w-10 h-10"></i></div>
                                    <p class="text-indigo-400 font-mono italic text-xs">${s.val}</p>
                                </div>
                            ` : s.type === 'inflation' ? `
                                <div class="grid grid-cols-3 gap-2">
                                    <div class="db-card p-3 text-center"><p class="text-[7px] text-slate-400 uppercase font-bold">${s.kpis[0]}</p><p class="text-orange-500 text-xs font-bold">+17.6%</p></div>
                                    <div class="db-card p-3 text-center"><p class="text-[7px] text-slate-400 uppercase font-bold">${s.kpis[1]}</p><p class="text-rose-500 text-xs font-bold">${s.cats[0]}</p></div>
                                    <div class="db-card p-3 text-center"><p class="text-[7px] text-slate-400 uppercase font-bold">${s.kpis[2]}</p><p class="text-indigo-400 text-xs font-bold">$1.2M</p></div>
                                </div>
                                <div class="db-card flex-1 p-4">
                                    <p class="text-[9px] font-bold uppercase mb-4 text-slate-400 tracking-tighter">${s.chartTitle}</p>
                                    <div class="space-y-4">
                                        ${s.cats.map((cat, idx) => `
                                            <div class="flex items-center gap-3">
                                                <span class="text-[8px] w-16 text-right text-slate-300 font-bold">${cat}</span>
                                                <div class="flex-1 h-2 bg-slate-800 rounded-full overflow-hidden">
                                                    <div class="h-full ${['bg-rose-500','bg-orange-500','bg-amber-500','bg-emerald-500'][idx]}" style="width: ${[92, 75, 45, 30][idx]}%"></div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : `
                                <div class="grid grid-cols-2 gap-4 flex-1">
                                    <div class="db-card p-4 flex flex-col items-center justify-center relative">
                                        <p class="text-[8px] font-bold uppercase mb-4 text-slate-400 absolute top-4 left-4">${s.chartTitles[0]}</p>
                                        <svg viewBox="0 0 36 36" class="w-20 h-20">
                                            <path class="text-indigo-500" stroke-dasharray="70, 100" stroke="currentColor" stroke-width="4" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                            <path class="text-orange-500" stroke-dasharray="30, 100" stroke-dashoffset="-70" stroke="currentColor" stroke-width="4" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        </svg>
                                        <div class="mt-4 flex gap-4 text-[7px] font-bold uppercase">
                                            <span class="flex items-center gap-1"><div class="w-1.5 h-1.5 bg-indigo-500 rounded-sm"></div> ${s.types[0]}</span>
                                            <span class="flex items-center gap-1"><div class="w-1.5 h-1.5 bg-orange-500 rounded-sm"></div> ${s.types[1]}</span>
                                        </div>
                                    </div>
                                    <div class="db-card p-4">
                                        <p class="text-[8px] font-bold uppercase mb-4 text-slate-400">${s.chartTitles[1]}</p>
                                        ${['Rent', 'Food', 'Car', 'Fun'].map((cat, idx) => `
                                            <div class="mb-2">
                                                <div class="flex justify-between text-[7px] mb-1"><span>${cat}</span><span>$${[400, 150, 90, 45][idx]}k</span></div>
                                                <div class="h-1 bg-slate-800 rounded-full"><div class="h-full bg-indigo-400" style="width:${[80, 40, 30, 15][idx]}%"></div></div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                <div class="db-card h-24 p-4 relative">
                                    <p class="text-[8px] font-bold uppercase mb-2 text-slate-400 absolute top-2 left-4">${s.chartTitles[2]}</p>
                                    <div class="flex items-end justify-between h-8 gap-1 mt-4">
                                        ${s.months.map((m, idx) => `
                                            <div class="flex flex-col items-center flex-1">
                                                <div class="w-full bg-indigo-500/20 rounded-t-sm relative" style="height: ${[40, 60, 45, 90, 70, 85][idx]}%">
                                                    <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-indigo-400 rounded-full"></div>
                                                </div>
                                                <span class="text-[6px] text-slate-500 mt-1">${m}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('carousel-dots').innerHTML = t.carousel.map((_, i) => `
                <button onclick="goToSlide(${i})" class="hero-dot w-2 h-2 rounded-full bg-slate-200 ${i===0?'active':''} transition-all"></button>
            `).join('');

            document.getElementById('modules-grid').innerHTML = t.moduleItems.map(m => `
                <div class="p-6 rounded-[2rem] feature-card bg-white shadow-sm">
                    <div class="${m.color} w-12 h-12 flex items-center justify-center rounded-2xl mb-4 shadow-sm"><i data-lucide="${m.icon}"></i></div>
                    <h3 class="text-lg font-extrabold italic mb-1 tracking-tighter text-slate-900">${m.title}</h3>
                    <p class="text-slate-500 text-[11px] leading-tight font-medium uppercase tracking-wider">${m.short}</p>
                </div>
            `).join('');

            lucide.createIcons();
        }

        let currentSlide = 0;
        function goToSlide(idx) {
            currentSlide = idx;
            document.getElementById('carousel').style.transform = `translateX(-${idx * 100}%)`;
            document.querySelectorAll('.hero-dot').forEach((d, i) => i === idx ? d.classList.add('active') : d.classList.remove('active'));
        }

        window.onload = () => { render(); setInterval(() => { currentSlide = (currentSlide + 1) % 3; goToSlide(currentSlide); }, 8000); };
    </script>
</body>
</html>
